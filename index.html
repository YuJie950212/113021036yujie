<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的互動便利貼牆</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #333;
            --primary-color: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        /* 輸入控制區塊 */
        .input-container {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 600px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            min-width: 200px;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        select {
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            font-size: 1rem;
            cursor: pointer;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #4338ca;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 便利貼牆排版 */
        .wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        /* 動態便利貼樣式 */
        .note {
            padding: 1.2rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            animation: popIn 0.3s ease-out;
        }

        .note:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .note .text {
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-word;
        }

        .note .hint {
            font-size: 0.75rem;
            opacity: 0.6;
            text-align: right;
            margin-top: 1rem;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>互動記憶便利貼牆</h1>
        <p>寫下你的留言並新增</p>
        <p>113021036 張毓傑</p>
    </header>

    <div class="input-container">
        <input type="text" id="noteInput" placeholder="寫點什麼吧..." maxlength="50">
        
        <select id="colorSelect">
            <option value="#fef08a">經典黃</option>
            <option value="#bfdbfe">天空藍</option>
            <option value="#bbf7d0">薄荷綠</option>
            <option value="#fbcfe8">櫻花粉</option>
        </select>
        
        <button onclick="addNote()">新增便利貼</button>
    </div>

    <div class="wall" id="noteWall"></div>

    <script>
        const noteInput = document.getElementById('noteInput');
        const colorSelect = document.getElementById('colorSelect');
        const noteWall = document.getElementById('noteWall');

        // 網頁載入時，自動讀取之前儲存的留言
        document.addEventListener("DOMContentLoaded", loadNotes);

        // 功能 1：新增便利貼並儲存
        function addNote() {
            const content = noteInput.value.trim();
            if (content === "") {
                alert("請先輸入一些文字喔！");
                return;
            }

            const selectedColor = colorSelect.value;
            const randomRotation = (Math.random() * 6 - 3).toFixed(1) + "deg";
            
            // 建立留言物件（加上唯一的 ID 方便後續刪除）
            const noteData = {
                id: Date.now(),
                content: content,
                color: selectedColor,
                rotation: randomRotation
            };

            // 渲染到畫面上
            createNoteElement(noteData);

            // 儲存到 localStorage
            saveNoteToStorage(noteData);

            noteInput.value = "";
        }

        // 功能 2：在畫面上建立便利貼 DOM 元素
        function createNoteElement(noteData) {
            const newNote = document.createElement('div');
            newNote.className = 'note';
            newNote.style.backgroundColor = noteData.color;
            newNote.style.transform = `rotate(${noteData.rotation})`;
            newNote.setAttribute('data-id', noteData.id);
            
            newNote.onclick = function() { deleteNote(noteData.id, this); };

            newNote.innerHTML = `
                <div class="text">${noteData.content}</div>
                <div class="hint">點擊可刪除</div>
            `;

            noteWall.appendChild(newNote);
        }

        // 功能 3：儲存資料到 localStorage
        function saveNoteToStorage(noteData) {
            let notes = getNotesFromStorage();
            notes.push(noteData);
            localStorage.setItem('myWallNotes', JSON.stringify(notes));
        }

        // 功能 4：從 localStorage 取得所有留言
        function getNotesFromStorage() {
            const storedNotes = localStorage.getItem('myWallNotes');
            return storedNotes ? JSON.parse(storedNotes) : [];
        }

        // 功能 5：載入並顯示所有儲存的留言
        function loadNotes() {
            noteWall.innerHTML = ""; // 先清空
            const notes = getNotesFromStorage();
            notes.forEach(note => createNoteElement(note));
        }

        // 功能 6：刪除留言（包含畫面與 localStorage）
        function deleteNote(id, element) {
            element.style.transform = "scale(0)";
            element.style.opacity = "0";
            
            setTimeout(() => {
                element.remove();
                
                // 從 localStorage 中移除特定 ID 的資料
                let notes = getNotesFromStorage();
                notes = notes.filter(note => note.id !== id);
                localStorage.setItem('myWallNotes', JSON.stringify(notes));
            }, 200);
        }

        // 支援 Enter 鍵快捷新增
        noteInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addNote();
            }
        });
    </script>
</body>
</html>
