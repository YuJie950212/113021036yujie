<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的互動便利貼牆</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #333;
            --primary-color: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        /* 輸入控制區塊 */
        .input-container {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 600px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            min-width: 200px;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        select {
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            font-size: 1rem;
            cursor: pointer;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #4338ca;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 便利貼牆排版 */
        .wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        /* 動態便利貼樣式 */
        .note {
            padding: 1.2rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: popIn 0.3s ease-out;
            transform: rotate(var(--rotation));
        }

        .note:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .note .text {
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-word;
        }

        .note .hint {
            font-size: 0.75rem;
            opacity: 0.6;
            text-align: right;
            margin-top: 1rem;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>互動便利貼留言牆</h1>
        <p>輸入你想說的話，點擊新增！也可以點擊現有的便利貼將其撕掉。</p>
    </header>

    <div class="input-container">
        <input type="text" id="noteInput" placeholder="寫點什麼吧..." maxlength="50">
        
        <select id="colorSelect">
            <option value="#fef08a">經典黃</option>
            <option value="#bfdbfe">天空藍</option>
            <option value="#bbf7d0">薄荷綠</option>
            <option value="#fbcfe8">櫻花粉</option>
        </select>
        
        <button onclick="addNote()">新增便利貼</button>
    </div>

    <div class="wall" id="noteWall">
        <div class="note" style="background-color: #fef08a; --rotation: -2deg;" onclick="deleteNote(this)">
            <div class="text">歡迎來到我的互動網頁！</div>
            <div class="hint">點擊可刪除</div>
        </div>
        <div class="note" style="background-color: #bbf7d0; --rotation: 3deg;" onclick="deleteNote(this)">
            <div class="text">這是一個用 JavaScript 做的動態效果。</div>
            <div class="hint">點擊可刪除</div>
        </div>
    </div>

    <script>
        // 獲取網頁上的元素
        const noteInput = document.getElementById('noteInput');
        const colorSelect = document.getElementById('colorSelect');
        const noteWall = document.getElementById('noteWall');

        // 功能 1：新增便利貼
        function addNote() {
            const content = noteInput.value.trim();
            
            // 防呆：如果沒輸入內容就不執行
            if (content === "") {
                alert("請先輸入一些文字喔！");
                return;
            }

            const selectedColor = colorSelect.value;
            
            // 隨機產生一個微小的旋轉角度，讓便利貼看起來更自然
            const randomRotation = (Math.random() * 6 - 3).toFixed(1) + "deg";

            // 創建新的便利貼 HTML 結構
            const newNote = document.createElement('div');
            newNote.className = 'note';
            newNote.style.backgroundColor = selectedColor;
            newNote.style.setProperty('--rotation', randomRotation);
            
            // 設定點擊這張新便利貼時會觸發刪除
            newNote.onclick = function() { deleteNote(this); };

            // 填入文字內容
            newNote.innerHTML = `
                <div class="text">${content}</div>
                <div class="hint">點擊可刪除</div>
            `;

            // 將新便利貼加進牆上
            noteWall.appendChild(newNote);

            // 清空輸入框
            noteInput.value = "";
        }

        // 功能 2：點擊刪除便利貼
        function deleteNote(element) {
            // 加上淡出效果後刪除
            element.style.transition = "transform 0.2s, opacity 0.2s";
            element.style.transform = "scale(0)";
            element.style.opacity = "0";
            
            setTimeout(() => {
                element.remove();
            }, 200);
        }

        // 優化體驗：在輸入框按下 Enter 鍵也能直接新增
        noteInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addNote();
            }
        });
    </script>
</body>
</html>
